build:
  gpu: true
  cuda: "12.8"
  python_version: "3.12"
  system_packages:
    - "ffmpeg"
    - "libsndfile1-dev"
  run:
    - "git clone --depth 1 https://github.com/ace-step/ACE-Step-1.5.git /tmp/ace-step"
    - "pip install --extra-index-url https://download.pytorch.org/whl/cu128 /tmp/ace-step/acestep/third_parts/nano-vllm /tmp/ace-step"
    - "rm -rf /tmp/ace-step"

image: "r8.im/fishaudio/ace-step-1.5"
predict: "predict.py:Predictor"
