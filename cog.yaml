build:
  gpu: true
  cuda: "12.8"
  python_version: "3.12"
  system_packages:
    - "git"
    - "ffmpeg"
    - "libsndfile1-dev"
  python_packages:
    - "torch==2.10.0+cu128"
    - "torchvision==0.25.0+cu128"
    - "torchaudio==2.10.0+cu128"
  python_extra_index_urls:
    - "https://download.pytorch.org/whl/cu128"
  run:
    - "pip install git+https://github.com/ace-step/ACE-Step-1.5.git"

predict: "predict.py:Predictor"
